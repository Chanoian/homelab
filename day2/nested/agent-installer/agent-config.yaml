apiVersion: v1beta1
kind: AgentConfig
metadata:
  name: nested
rendezvousIP: 192.168.2.62
additionalNTPSources:
- pool.ntp.org
hosts:
- hostname: master-0
  role: master
  interfaces:
  - name: enp1s0
    macAddress: 02:7c:71:f2:81:4b
  networkConfig:
    interfaces:
    - name: enp1s0
      type: ethernet
      state: up
      ipv4:
        enabled: true
        address:
        - ip: 192.168.2.62
          prefix-length: 24
        dhcp: false
      ipv6:
        enabled: false
    dns-resolver:
      config:
        server:
        - 192.168.2.51
    routes:
      config:
      - destination: 0.0.0.0/0
        next-hop-address: 192.168.2.1
        next-hop-interface: enp1s0
        table-id: 254

- hostname: master-1
