apiVersion: lvm.topolvm.io/v1alpha1
kind: LVMCluster
metadata:
  name: lvm-storage-990pro
  namespace: openshift-lvm-storage
spec:
  storage:
    deviceClasses:
      - name: fast-ssd-pool
        deviceSelector:
          paths:
            - /dev/nvme0n1
        thinPoolConfig:
          name: thin-pool-1
          overprovisionRatio: 10