apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: nested-bootstrap
  namespace: nested-openshift-os-images
spec:
  runStrategy: Always
  template:
    spec:
      domain:
        cpu:
          cores: 4
          model: host-passthrough
        memory:
          guest: 16Gi
        devices:
          disks:
            - disk:
                bus: virtio
              name: rootdisk
            - disk:
                bus: virtio
              name: ignition-disk
          interfaces:
            - masquerade: {}
              name: default
      networks:
        - name: default
          pod: {}
      volumes:
        - name: rootdisk
          dataVolume:
            name: nested-bootstrap-disk
        - name: ignition-disk
          cloudInitConfigDrive:
            secretRef:
              name: nested-bootstrap-ign
  dataVolumeTemplates:
    - metadata:
        name: nested-bootstrap-disk
      spec:
        source:
          pvc:
            namespace: nested-openshift-os-images
            name: rhcos-421-base
        storage:
          storageClassName: lvms-fast-ssd-pool
          volumeMode: Block
          resources:
            requests:
              storage: 50Gi