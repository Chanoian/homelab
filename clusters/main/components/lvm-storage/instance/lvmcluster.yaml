apiVersion: lvm.topolvm.io/v1alpha1
kind: LVMCluster
metadata:
  name: lvmcluster
  namespace: openshift-storage
  annotations:
    argocd.argoproj.io/sync-wave: "20"
    storageclass.kubernetes.io/is-default-class: "true"
spec:
  storage:
    deviceClasses:
      - fstype: xfs
        name: hcp-vm-storage
        deviceSelector:
          paths:
            - /dev/nvme1n1
        thinPoolConfig:
          chunkSizeCalculationPolicy: Static
          name: thin-pool-1
          overprovisionRatio: 10
          sizePercent: 90
