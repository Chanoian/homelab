apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: parent-app
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/Chanoian/homelab.git
    targetRevision: main
    path: argo-apps
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
