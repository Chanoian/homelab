apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: main-operators-subscriptions
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  destination:
    namespace: openshift-gitops
    server: 'https://kubernetes.default.svc'
  source:
    path: 'clusters/main/operators/subscriptions'
    repoURL: https://github.com/Chanoian/homelab.git 
    targetRevision: main
    helm:
      valueFiles:
        - values.yaml
  project: default
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
    - Validate=false
    automated:
      prune: true
      selfHeal: true
