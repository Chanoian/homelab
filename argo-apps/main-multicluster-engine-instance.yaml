apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: main-multicluster-engine-instance
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  destination:
    namespace: openshift-gitops
    server: https://kubernetes.default.svc
  source:
    path: clusters/main/components/multicluster-engine/instance
    repoURL: https://github.com/Chanoian/homelab.git
    targetRevision: main
  project: default
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - Validate=false
      - SkipDryRunOnMissingResource=true
    automated:
      prune: true
      selfHeal: true
