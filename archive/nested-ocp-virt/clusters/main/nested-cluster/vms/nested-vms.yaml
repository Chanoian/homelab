---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: master-0
  namespace: nested-cluster
spec:
  runStrategy: Always
  template:
    metadata:
      labels:
        kubevirt.io/domain: master-0
        cluster: nested-araclab
        role: master
    spec:
      domain:
        cpu:
          cores: 8
          dedicatedCpuPlacement: true
        memory:
          guest: 20Gi
        devices:
          disks:
          - bootOrder: 1
            disk:
              bus: virtio
            name: rootdisk
          - bootOrder: 2
            cdrom:
              bus: sata
            name: agentiso
          interfaces:
          - name: localnet
            bridge: {}
            macAddress: "02:7c:71:f2:81:4b"
      networks:
      - name: localnet
        multus:
          networkName: nested-cluster/br-nested
      volumes:
      - dataVolume:
          name: master0-rootdisk
        name: rootdisk
      - name: agentiso
        persistentVolumeClaim:
          claimName: master0-agentiso
